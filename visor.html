<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Visor - MarmoScans</title>
    <style>
      body {
        background-color: #0b0d17;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0;
        font-family: Arial, sans-serif;
      }

      /* Header restaurado */
      header {
        width: 100%;
        position: relative;
        z-index: 1000;
        background: #0b0d17;
        border-bottom: 1px solid #333;
        padding: 15px 0;
      }

      #manga-container {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 20px;
      }

      /* Imágenes verticales base (1050px) */
      .page-img {
        width: 95%;
        max-width: 1050px;
        margin: 10px auto;
        display: block;
      }

      /* Imágenes dobles (detectadas por el script) */
      .double-page {
        max-width: 1400px !important;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      }

      /* Diseño de botones */
      .nav-footer {
        width: 90%;
        max-width: 800px;
        display: flex;
        justify-content: space-between;
        padding: 40px 0;
      }
      .nav-btn {
        color: white;
        text-decoration: none;
        font-weight: bold;
        padding: 10px 20px;
        background: #333;
        border-radius: 5px;
        transition: 0.3s;
      }
      .nav-btn:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <header>
      <h1
        id="info-display"
        style="text-align: center; margin: 0; font-size: 1.5rem"
      >
        Cargando...
      </h1>
    </header>

    <div id="manga-container"></div>

    <div class="nav-footer">
      <a id="prev-btn" class="nav-btn">Anterior</a>
      <a id="back-to-list" class="nav-btn">Volver a la lista</a>
      <a id="next-btn" class="nav-btn">Siguiente</a>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const manga = params.get("manga") || "OnePiece";
      const cap = parseInt(params.get("c")) || 1;

      document.getElementById("info-display").innerText =
        `${manga} - Capítulo ${cap}`;
      document.getElementById("back-to-list").href =
        `mangas/${manga.toLowerCase()}.html`;
      document.getElementById("next-btn").href =
        `visor.html?manga=${manga}&c=${cap + 1}`;
      document.getElementById("prev-btn").href =
        cap > 1 ? `visor.html?manga=${manga}&c=${cap - 1}` : "#";

      const container = document.getElementById("manga-container");

      // Función que carga imágenes en orden exacto
      function cargarPaginas(i) {
        let p = i.toString().padStart(3, "0");
        let img = new Image();
        img.src = `Marmoscans/${manga}/${cap}/${cap}-${p}.webp`;
        img.className = "page-img";

        img.onload = function () {
          // Si la imagen es más ancha que 1200px, es doble
          if (this.naturalWidth > 1200) {
            this.classList.add("double-page");
          }
          container.appendChild(img);
          cargarPaginas(i + 1); // Llama a la siguiente página
        };

        img.onerror = function () {
          console.log("Fin del capítulo.");
        };
      }

      cargarPaginas(1);
    </script>
  </body>
</html>
