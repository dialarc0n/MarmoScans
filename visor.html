<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visor - MarmoScans</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
    />
    <style>
      body {
        background-color: #0b0d17;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0;
        font-family: sans-serif;
      }
      header {
        width: 100%;
        position: relative;
        top: 0;
        z-index: 1000;
        background: #0b0d17;
        border-bottom: 1px solid #333;
      }

      #manga-container {
        width: 100%;
        max-width: 900px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 0;
      }
      #manga-container img {
        width: 100%; /* Asegura que no se salga de la pantalla en móviles */
        max-width: 1600px; /* AQUÍ limitas el tamaño máximo de la imagen */
        height: auto;
        display: block;
        margin: 5px auto; /* 'auto' centra la imagen si es más pequeña que la pantalla */
      }

      .nav-footer {
        width: 90%;
        max-width: 800px;
        display: flex;
        justify-content: space-between;
        padding: 20px;
        background: #161821;
        border-radius: 10px;
        margin: 40px 0;
        border: 1px solid #333;
      }
      .nav-btn {
        color: white;
        text-decoration: none;
        font-weight: bold;
        padding: 12px 25px;
        background: #5a32a8;
        border-radius: 6px;
        transition: 0.3s;
      }
      .nav-btn:hover {
        background: #7c4dff;
      }
      .list-btn {
        background: #333;
      }
      /* Estilo para páginas normales */
      .single-page {
        width: 100%;
        max-width: 1100px; /* Ajusta este ancho a tu gusto */
        margin: 15px auto;
        display: block;
      }

      /* Estilo para páginas dobles */
      .double-page {
        width: 100%;
        max-width: 1800px; /* Tamaño mayor para las dobles */
        margin: 25px auto;
        display: block;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <span class="logo-icon"><i class="fas fa-book-open"></i></span>
        <h1>MarmoScans</h1>
      </div>

      <nav class="main-nav">
        <a href="index.html" class="nav-link active">Inicio</a>
        <a href="https://sites.google.com/view/marmoweb/inicio" class="nav-link"
          >MarmoWeb</a
        >
        <a href="https://x.com/MarmotaSenpai" class="nav-link">Twitter</a>
        <a
          href="https://www.instagram.com/marmotasenpai/?hl=es"
          class="nav-link"
          >Instagram</a
        >
        <a href="https://www.youtube.com/@MarmotaSenpai1" class="nav-link"
          >Youtube</a
        >
      </nav>

      <button class="mobile-menu-btn">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <div id="manga-container">
      <h2 id="info-display" style="margin-bottom: 20px; color: #aaa">
        Cargando contenido...
      </h2>
    </div>

    <div class="nav-footer">
      <a href="#" id="prev-btn" class="nav-btn">← ANTERIOR</a>
      <a href="index.html" id="back-to-list" class="nav-btn list-btn"
        ><i class="fas fa-bars"></i
      ></a>
      <a href="#" id="next-btn" class="nav-btn">SIGUIENTE →</a>
    </div>

    <script>
      // 1. Capturar los datos de la URL
      const params = new URLSearchParams(window.location.search);
      const manga = params.get("manga") || "OnePiece"; // Manga por defecto
      const cap = parseInt(params.get("c")) || 1; // Capítulo por defecto

      // 2. Actualizar textos e información
      document.getElementById("info-display").innerText =
        `${manga.replace(/([A-Z])/g, " $1")} - Capítulo ${cap}`;
      document.title = `${manga} Cap ${cap} - MarmoScans`;

      // 3. Configurar botones de navegación
      // Definimos el primer capítulo disponible
      const primerCapitulo = 1171;

      // Botón Anterior
      const prevBtn = document.getElementById("prev-btn");
      if (cap <= primerCapitulo) {
        // Si estamos en el primer capítulo, ocultamos el botón
        prevBtn.style.visibility = "hidden"; // Oculta visualmente pero mantiene el espacio
      } else {
        prevBtn.href = `visor.html?manga=${manga}&c=${cap - 1}`;
        prevBtn.style.visibility = "visible";
      }

      // Botón Siguiente (siempre activo en tu caso)
      document.getElementById("next-btn").href =
        `visor.html?manga=${manga}&c=${cap + 1}`;

      // 4. Cargar imágenes dinámicamente
      const container = document.getElementById("manga-container");

      // En lugar de un bucle 'for', usaremos una función que cargue una por una
      function cargarPaginas(i) {
        let p = i.toString().padStart(3, "0");
        let img = document.createElement("img");

        // RUTA DINÁMICA
        img.src = `Marmoscans/${manga}/${cap}/${cap}-${p}.webp`;

        // ESTO ES LO NUEVO: Detectar tamaño cuando la imagen cargue
        img.onload = function () {
          // Si el ancho es mayor a 1200px, es una página doble
          if (this.naturalWidth > 3000) {
            this.classList.add("double-page");
          } else {
            this.classList.add("single-page");
          }
          container.appendChild(this);
          // Cargar la siguiente página solo si la anterior existió
          cargarPaginas(i + 1);
        };

        img.onerror = function () {
          // Si falla (no existe la página), simplemente paramos
          console.log("Fin del capítulo.");
        };
      }

      // Iniciar carga
      cargarPaginas(1);
    </script>
  </body>
</html>
