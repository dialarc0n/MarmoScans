<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Visor de Manga</title>
    <style>
        body { background-color: #0b0d17; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }

        /* HEADER PERSISTENTE */
        header { width: 100%; background: #10121d; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .menu-btn { font-size: 24px; cursor: pointer; color: white; text-decoration: none; }
        
        /* CONTENEDOR */
        #manga-pages { width: 100%; max-width: 1200px; padding: 20px 0; display: flex; flex-direction: column; align-items: center; }
        #manga-pages img { width: 100%; max-width: 800px; height: auto; display: block; margin-bottom: 10px; }

        /* FOOTER DE NAVEGACIÓN (Estilo Manga) */
        .nav-footer { width: 100%; max-width: 800px; background: #1a1d29; padding: 15px; display: flex; justify-content: space-between; margin-top: 20px; border-radius: 5px; }
        .nav-footer a { color: white; text-decoration: none; font-weight: bold; padding: 10px; background: #333; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="menu-btn">☰</a>
        <h2 id="titulo-cap" style="margin:0; font-size: 1.2rem;">Cargando...</h2>
        <div style="width: 30px;"></div> </header>

    <div id="manga-pages"></div>

    <div class="nav-footer">
        <a href="#" id="prev-link">← PREV</a>
        <a href="index.html">Lista de Capítulos</a>
        <a href="#" id="next-link">NEXT →</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let cap = parseInt(params.get('c')) || 1;
        const currentCapNum = 1165 + cap;
        
        document.getElementById('titulo-cap').innerText = "One Piece " + currentCapNum;

        // Lógica de botones
        const nextLink = document.getElementById('next-link');
        const prevLink = document.getElementById('prev-link');
        
        nextLink.href = `visor.html?c=${cap + 1}`;
        prevLink.href = (cap > 1) ? `visor.html?c=${cap - 1}` : "#";

        // Carga de imágenes
        const container = document.getElementById('manga-pages');
        for (let i = 1; i <= 30; i++) {
            let pageNum = i.toString().padStart(3, '0');
            let img = document.createElement('img');
            img.src = `manga/OnePiece/${currentCapNum}/${currentCapNum}-${pageNum}.png`; 
            img.onerror = function() { this.style.display = 'none'; };
            container.appendChild(img);
        }
    </script>
</body>
</html>
