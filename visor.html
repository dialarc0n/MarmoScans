<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarmoScans - Visor</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"/>
    <style>
        /* Ajustes para que el visor no se vea roto */
        body { background-color: #0b0d17; color: white; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; } /* Asegura que el header ocupe el ancho */
        #manga-pages { width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        #manga-pages img { width: 100%; height: auto; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span class="logo-icon"><i class="fas fa-book-open"></i></span>
            <h1>MarmoScans</h1>
        </div>
        <nav class="main-nav">
            <a href="index.html" class="nav-link">Inicio</a>
            <a href="#" class="nav-link">MarmoWeb</a>
            <a href="#" class="nav-link">Twitter</a>
        </nav>
    </header>

    <div id="manga-pages">
        <h2 id="titulo-cap">Cargando...</h2>
    </div>

    <div class="nav-footer" style="margin-bottom: 50px;">
        <a href="#" id="prev-link" style="padding: 10px; background: #5a32a8; color:white; text-decoration:none;">← PREV</a>
        <a href="index.html" style="padding: 10px; background: #333; color:white; text-decoration:none;">☰ Lista</a>
        <a href="#" id="next-link" style="padding: 10px; background: #5a32a8; color:white; text-decoration:none;">NEXT →</a>
    </div>

<script>
    // 1. Obtener el número de capítulo de la URL (ej: visor.html?c=1171)
    const params = new URLSearchParams(window.location.search);
    let cap = parseInt(params.get('c')) || 1171; // Si no hay nada, por defecto 1171
    
    // 2. Actualizar el título
    document.getElementById('titulo-cap').innerText = "Capítulo " + cap;
    document.title = "One Piece " + cap + " - MarmoScans";

    // 3. Configurar enlaces de navegación
    document.getElementById('next-link').href = `visor.html?c=${cap + 1}`;
    document.getElementById('prev-link').href = `visor.html?c=${cap - 1}`;

    // 4. Cargar imágenes
    const container = document.getElementById('manga-pages');
    // Limpiamos el contenedor por si acaso
    container.innerHTML = '<h2 id="titulo-cap">Capítulo ' + cap + '</h2>';

    for (let i = 1; i <= 30; i++) {
        let p = i.toString().padStart(3, '0');
        let img = document.createElement('img');
        
        // ¡OJO AQUÍ! Esta ruta debe coincidir con tu carpeta en GitHub
        // Tu carpeta es: /OnePiece/1171/
        img.src = `OnePiece/${cap}/${cap}-${p}.png`; 
        
        // Si la imagen falla, no la mostramos
        img.onerror = function() { this.style.display = 'none'; };
        container.appendChild(img);
    }
</script>
</body>
</html>
