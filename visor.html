<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Visor de Manga - MarmoScans</title>
    <style>
        /* Diseño Minimalista para Lectura */
        body {
            background-color: #050505; /* Casi negro para que resalten las páginas */
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cabecera pegajosa (Sticky) */
        header {
            width: 100%;
            background: rgba(16, 18, 29, 0.95);
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .nav-btn {
            background: #8b5cf6;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-family: sans-serif;
            margin: 0 10px;
            font-size: 14px;
        }

        /* Contenedor de Imágenes */
        #manga-pages {
            width: 100%;
            max-width: 1400px; /* Aquí caben de sobra las páginas dobles */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        /* Estilo para que las dobles se agranden solas */
        #manga-pages img {
            width: auto;
            max-width: 100%; /* No deja que se salgan de la pantalla */
            height: auto;
            display: block;
            margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* En PC, las verticales no se verán tan flacas */
        @media (min-width: 1024px) {
            #manga-pages img { min-width: 60%; }
        }
    </style>
</head>
<body>
    <header>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./css/styles.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css" integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="shortcut icon" href="assets/icons/Icon_image.jpg" type="image/x-icon">
        <title>MarmoScans</title>
    </header>

    <div id="manga-pages"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let cap = parseInt(params.get('c')) || 1;
        
        document.getElementById('titulo-cap').innerText = "Capítulo " + (1165 + cap);

        // Botón siguiente
        const nextBtn = document.getElementById('next-btn');
        if (cap < 10) { nextBtn.href = `visor.html?c=${cap + 1}`; } 
        else { nextBtn.style.display = 'none'; }

        // Cargar páginas
        const container = document.getElementById('manga-pages');
        for (let i = 1; i <= 30; i++) {
            let pageNum = i.toString().padStart(3, '0');
            let img = document.createElement('img');
            img.src = `manga/capitulo-${cap}/${1165 + cap}-${pageNum}.png`; 
            img.onerror = function() { this.style.display = 'none'; };
            container.appendChild(img);
        }
    </script>
</body>
</html>
