<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Manga</title>
    <style>
        body { background-color: #0b0d17; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        .manga-container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        img { max-width: 100%; height: auto; margin-bottom: 10px; border-bottom: 2px solid #1a1d29; }
        .back-btn { display: inline-block; margin: 20px; padding: 10px 20px; background: #5a32a8; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Volver al inicio</a>
    <h1 id="titulo-cap">Cargando...</h1>
    
    <div id="manga-pages" class="manga-container">
        </div>

    <script>
    const params = new URLSearchParams(window.location.search);
    const cap = params.get('c');
    // Mostramos el número del capítulo en el título
    document.getElementById('titulo-cap').innerText = "Capítulo 1166"; 

    const container = document.getElementById('manga-pages');

    // Bucle para cargar las fotos (ajusta el 20 por la cantidad de fotos que tengas)
    for (let i = 1; i <= 20; i++) {
        let pageNum = i.toString().padStart(3, '0'); 
        let img = document.createElement('img');
        
        // RUTA CORRECTA: carpeta 'manga' / capítulo / nombre de archivo
        // Tus fotos se llaman 1166-001.png, 1166-003.png...
        img.src = `manga/capitulo-${cap}/1166-${pageNum}.png`; 
        
        // Estilo básico para que se vean una debajo de otra
        img.style.width = "100%";
        img.style.maxWidth = "800px";
        img.style.display = "block";
        img.style.margin = "0 auto 10px auto";

        // Si la página no existe (ej. te saltaste el 002), no muestra error
        img.onerror = function() { this.style.display = 'none'; };
        
        container.appendChild(img);
    }
</script>
</body>
</html>
